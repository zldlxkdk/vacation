        costHtml += `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mt-6">
            <div class="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100 bg-slate-50 flex items-center gap-2">
              <i data-lucide="list-tree" class="w-4 h-4 sm:w-5 sm:h-5 text-slate-500"></i>
              <h3 class="font-bold text-slate-800 text-base sm:text-lg">상세 비용 내역</h3>
            </div>
            <div class="divide-y divide-slate-100">
        `;

        costData.categories.forEach(cat => {
          costHtml += `
            <div class="p-4 sm:p-5">
              <h4 class="font-bold text-slate-800 flex items-center gap-2 mb-3 sm:mb-4 text-[15px] sm:text-base">
                <span class="flex items-center justify-center w-5 h-5 sm:w-6 sm:h-6 rounded-md ${cat.bg} ${cat.color}">
                  <i data-lucide="${cat.icon}" class="w-3 h-3 sm:w-3.5 sm:h-3.5"></i>
                </span>
                ${cat.name}
              </h4>
              <div class="space-y-3 sm:space-y-4 pl-2.5 sm:pl-3.5 border-l-2 border-slate-100 ml-2.5 sm:ml-3">
          `;
          
          cat.subItems.forEach(sub => {
            const isCompleted = sub.note.includes("완료") || sub.note.includes("확정");
            const badgeClass = isCompleted 
              ? "bg-emerald-50 text-emerald-700 font-bold border border-emerald-200" 
              : "bg-slate-50 text-slate-600 border border-slate-200";
            
            costHtml += `
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-1.5 md:gap-3">
                  <div class="flex-1 text-slate-700 text-[14px] md:text-base font-medium break-keep">
                    ${sub.title}
                  </div>
                  <div class="flex items-center justify-between md:justify-end gap-2 mt-0.5 md:mt-0">
                    <span class="text-[11px] px-1.5 sm:px-2 py-0.5 rounded flex items-center ${badgeClass}">
                      ${sub.note}
                    </span>
                    <span class="font-extrabold text-slate-800 text-[14px] sm:text-[15px] md:text-base shrink-0">${sub.price.toLocaleString()}원</span>
                  </div>
                </div>
            `;
          });
          
          costHtml += `
              </div>
            </div>
          `;
        });

        costHtml += `
            </div>
          </div>
        `;

        contentContainer.innerHTML = costHtml;
      } else {
        // 일반 일정 타임라인 페이지
        const dayData = tripData.find(d => d.day === activeDay);
        titleContainer.innerHTML = `
          <h2 class="text-2xl font-bold text-slate-800 flex items-center">
            <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg mr-3 text-lg">
              Day ${dayData.day}
            </span>
            ${dayData.title}
          </h2>
        `;

        contentContainer.className = "relative border-l-2 border-blue-100 ml-4 md:ml-6 space-y-8";
        contentContainer.innerHTML = dayData.events.map(event => {
          const config = typeConfigs[event.type] || typeConfigs.activity;
          const mapButtonHtml = event.mapQuery ? `
            <a href="https://map.naver.com/v5/search/${encodeURIComponent(event.mapQuery)}" target="_blank" rel="noopener noreferrer" class="ml-auto flex items-center shrink-0 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-1.5 rounded-md hover:bg-emerald-100 transition-colors shadow-sm">
              <i data-lucide="map" class="w-3.5 h-3.5 mr-1"></i>
              지도
            </a>
          ` : '';

          return `
            <div class="relative pl-8 md:pl-10">
              <div class="absolute -left-[17px] top-1 h-8 w-8 rounded-full border-4 border-white flex items-center justify-center shadow-sm ${config.bg}">
                <i data-lucide="${event.icon}" class="w-4 h-4 ${config.text}"></i>
              </div>
              <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div class="flex flex-wrap items-start justify-between gap-2 mb-2">
                  <div class="flex items-center space-x-2 text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-md text-sm w-fit">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>${event.time}</span>
                  </div>
                  <span class="text-xs font-semibold px-2.5 py-1 rounded-full border ${config.bg} ${config.text} ${config.border}">
                    ${config.label}
                  </span>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mt-3 mb-2">${event.title}</h3>
                <div class="flex items-center justify-between mb-4">
                  <div class="flex items-center text-slate-500 font-medium text-sm">
                    <i data-lucide="map-pin" class="w-4 h-4 mr-1.5 shrink-0"></i>
                    <span class="truncate max-w-[150px] sm:max-w-none">${event.place}</span>
                  </div>
                  ${mapButtonHtml}
                </div>
                <div class="bg-amber-50 rounded-xl p-4 border border-amber-100/50 relative overflow-hidden">
                  <div class="absolute top-0 left-0 w-1 h-full bg-amber-400"></div>
                  <div class="flex gap-3">
                    <div class="mt-0.5 text-amber-500 shrink-0">
                      <i data-lucide="info" class="w-[18px] h-[18px]"></i>
                    </div>
                    <div class="text-sm">
                      <p class="font-bold text-amber-800 mb-1 leading-tight">육아 꿀팁</p>
                      <p class="text-amber-900 leading-snug break-keep">${event.tip}</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function renderNavButtons() {
      const container = document.getElementById('nav-buttons-container');
      if (activeDay === 'cost') {
        container.innerHTML = `
          <button onclick="setActiveDay(1)" class="w-full py-4 bg-white border-2 border-slate-200 rounded-2xl font-bold text-slate-600 hover:bg-slate-50 transition-colors">
            1일 차 일정으로 돌아가기
          </button>
        `;
        return;
      }

      const isFirst = activeDay === 1;
      const isLast = activeDay === tripData.length;

      let html = '';
      if (!isFirst) {
        html += `
          <button onclick="setActiveDay(${activeDay - 1})" class="w-full py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 text-sm hover:bg-slate-50 transition-colors">
            이전 날 일정 보기
          </button>
        `;
      }
      
      if (!isLast) {
        html += `
          <button onclick="setActiveDay(${activeDay + 1})" class="w-full py-4 bg-blue-600 rounded-2xl font-extrabold text-white shadow-lg shadow-blue-200 text-lg hover:bg-blue-700 transition-colors">
            다음 날 (${activeDay + 1}일 차) 일정 보기
          </button>
        `;
      } else {
        html += `
          <button onclick="setActiveDay('cost')" class="w-full py-4 bg-emerald-600 rounded-2xl font-extrabold text-white shadow-lg shadow-emerald-200 text-lg hover:bg-emerald-700 transition-colors flex items-center justify-center gap-2">
            최종 비용 상세 확인하기
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
          </button>
        `;
      }
      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', renderApp);
  </script>
</body>
</html>

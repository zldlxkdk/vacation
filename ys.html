<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여수 가족 여행 일정</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 웹 폰트 적용 (Pretendard) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      scroll-behavior: smooth;
    }
    /* 스크롤바 숨기기 */
    .hide-scroll::-webkit-scrollbar { 
      display: none; 
    }
    .hide-scroll { 
      -ms-overflow-style: none; 
      scrollbar-width: none; 
    }
    /* 스티키 탭 배경 흐림 효과 */
    .sticky-tabs {
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: rgba(248, 250, 252, 0.9);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-24">

  <!-- Header Section -->
  <header class="bg-gradient-to-r from-blue-500 to-cyan-400 text-white pt-12 pb-8 px-6 shadow-md rounded-b-3xl">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center space-x-2 mb-2 bg-white/20 w-fit px-3 py-1 rounded-full text-sm font-medium backdrop-blur-sm">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <span>3박 4일 아이 동반 여행</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-extrabold mb-3 tracking-tight">여수 가족 여행 일정</h1>
      <p class="text-blue-50 text-lg opacity-90 flex items-center">
        <i data-lucide="heart" class="w-5 h-5 mr-2 fill-current"></i>
        5세, 10개월 아이와 함께하는 완벽한 풀빌라 휴가
      </p>
    </div>
  </header>

  <!-- Sticky Tabs Navigation -->
  <div class="sticky-tabs border-b border-slate-200 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3">
      <div id="tabs-container" class="flex space-x-2 overflow-x-auto hide-scroll">
        <!-- Tabs will be rendered here via JS -->
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 mt-8">
    
    <!-- Selected Day Title -->
    <div id="day-title-container" class="mb-8 pl-2">
      <!-- Title will be rendered here via JS -->
    </div>

    <!-- Timeline or Cost Container -->
    <div id="content-container">
      <!-- Events or Cost details will be rendered here via JS -->
    </div>

    <!-- Sequential Navigation Buttons (Bottom) -->
    <div id="nav-buttons-container" class="mt-12 flex flex-col w-full gap-3">
      <!-- Buttons will be rendered here via JS -->
    </div>

  </main>

  <script>
    // 여행 일정 데이터
    const tripData = [
      {
        day: 1,
        date: "3/28 (토)",
        title: "여수로 출발 & 풀빌라 체크인",
        events: [
          {
            time: "09:00 - 13:30",
            title: "이천 출발 ➔ 여수 이동",
            place: "[점심] 휴게소 자율 식사",
            tip: "주말 정체 감안하여 휴게소에서 점심 해결 및 이동 중 낮잠 유도",
            type: "travel",
            icon: "car"
          },
          {
            time: "13:30 - 15:00",
            title: "오동도 산책 (동백열차)",
            place: "여수 오동도",
            tip: "방파제 길을 따라 동백열차 탑승 (5세 아이 흥미 유발), 유모차 산책하기 좋은 평탄한 코스",
            type: "activity",
            icon: "camera",
            mapQuery: "여수 오동도"
          },
          {
            time: "15:00 - 16:00",
            title: "이순신광장 & 수산시장",
            place: "[저녁 준비] 활어회 및 간식 포장",
            tip: "바다김밥, 딸기모찌 등 유명 간식과 어른용 회 포장 (수산시장)",
            type: "food",
            icon: "utensils",
            mapQuery: "여수 수산시장"
          },
          {
            time: "16:00 - 18:30",
            title: "숙소 체크인 및 1차 물놀이",
            place: "[숙소] 여수 하이클래스153 풀빌라",
            tip: "저상형 침대 및 실내 온수풀 완비 객실. 짐 푸는 동안 5세 아이는 바로 물놀이 시작!",
            type: "accommodation",
            icon: "bed",
            mapQuery: "여수 하이클래스153"
          },
          {
            time: "18:30 이후",
            title: "저녁 식사 및 휴식",
            place: "펜션 내 식사",
            tip: "포장해 온 음식과 간식으로 편안하게 저녁 식사 후 이른 육아 퇴근",
            type: "food",
            icon: "moon",
            mapQuery: "여수 하이클래스153"
          }
        ]
      },
      {
        day: 2,
        date: "3/29 (일)",
        title: "여수 핫플 탐방 & 여유로운 휴식",
        events: [
          {
            time: "09:30 - 11:30",
            title: "여수 해상케이블카",
            place: "자산탑승장 출발",
            tip: "펜션 내 아침(밀키트) 해결 후 출발. 자산탑승장에서 유모차 채로 크리스탈 캐빈 탑승. 오전 일찍 방문해 대기 시간 최소화",
            type: "activity",
            icon: "anchor",
            mapQuery: "여수 해상케이블카 자산탑승장"
          },
          {
            time: "11:30 - 13:00",
            title: "점심 식사 (꽃돌게장1번가)",
            place: "[식당] 여수 꽃돌게장1번가",
            tip: "깔끔하고 쾌적해 유모차 동반이 수월한 여수 대표 게장 맛집. 셀프바(어묵, 불고기 등)가 잘 되어 있어 5세 아이 밥 먹이기도 아주 좋아요!",
            type: "food",
            icon: "utensils",
            mapQuery: "여수 꽃돌게장1번가"
          },
          {
            time: "13:00 - 15:00",
            title: "오션뷰 카페 휴식",
            place: "모이핀 등 대형 카페",
            tip: "아이들 간식 시간 및 어른들 당 충전 타임. 주말이라 사람이 많을 수 있으니 넓은 대형 카페를 추천합니다.",
            type: "cafe",
            icon: "coffee",
            mapQuery: "여수 모이핀"
          },
          {
            time: "15:00 - 18:30",
            title: "숙소 복귀 및 집중 물놀이",
            place: "[숙소] 여수 하이클래스153 풀빌라",
            tip: "일찍 숙소로 돌아와 주말 인파를 피해 온수풀에서 여유롭게 2차 물놀이를 즐기세요.",
            type: "accommodation",
            icon: "sun",
            mapQuery: "여수 하이클래스153"
          },
          {
            time: "18:30 이후",
            title: "저녁 식사 (바비큐) 및 휴식",
            place: "펜션 개별 테라스",
            tip: "아이들 안전하게 실내에 두고 테라스에서 고기 굽기. 식사 후 여유로운 밤 시간",
            type: "food",
            icon: "utensils",
            mapQuery: "여수 하이클래스153"
          }
        ]
      },
      {
        day: 3,
        date: "3/30 (월)",
        title: "평일의 여유, 아쿠아플라넷",
        events: [
          {
            time: "09:30 - 11:30",
            title: "예술랜드 조각공원",
            place: "여수 예술랜드",
            tip: "펜션 조식 후 이동. 오션뷰 조각공원 산책 및 트릭아트에서 5세 아이와 재미있는 가족 사진 촬영",
            type: "activity",
            icon: "camera",
            mapQuery: "여수 예술랜드"
          },
          {
            time: "11:30 - 13:00",
            title: "점심 식사",
            place: "로컬 맛집 (전복죽/칼국수 등)",
            tip: "아이들도 부담 없이 먹을 수 있는 자극적이지 않은 맑은 국물이나 죽 메뉴 선택",
            type: "food",
            icon: "utensils",
            mapQuery: "여수 돌산읍 전복죽"
          },
          {
            time: "13:00 - 15:30",
            title: "아쿠아플라넷 여수 (예약완료)",
            place: "여수엑스포역 인근",
            tip: "성인 2명, 5세 아이 80,700원 예약 완료. 주말보다 한산한 평일 오후에 관람하세요.",
            type: "activity",
            icon: "camera",
            mapQuery: "아쿠아플라넷 여수"
          },
          {
            time: "15:30 - 17:30",
            title: "숙소 휴식 및 3차 물놀이",
            place: "[숙소] 여수 하이클래스153 풀빌라",
            tip: "풀빌라 마지막 날! 아쉬움이 남지 않도록 여유롭게 마지막 온수풀 물놀이 즐기기",
            type: "accommodation",
            icon: "heart",
            mapQuery: "여수 하이클래스153"
          },
          {
            time: "17:30 이후",
            title: "저녁 식사 및 짐 정리",
            place: "숙소 내 배달음식",
            tip: "마지막 날 저녁은 간편하게 치킨/피자 등 배달음식으로 해결하고 여유롭게 다음 날 짐 정리",
            type: "food",
            icon: "moon",
            mapQuery: "여수 하이클래스153"
          }
        ]
      },
      {
        day: 4,
        date: "3/31 (화)",
        title: "아쉬운 체크아웃 & 집으로",
        events: [
          {
            time: "09:00 - 11:00",
            title: "기상 및 체크아웃",
            place: "[숙소] 여수 하이클래스153 풀빌라",
            tip: "여유롭게 아침 식사 후 잊은 물건 없이 꼼꼼히 짐 챙겨 11시 체크아웃",
            type: "accommodation",
            icon: "bed",
            mapQuery: "여수 하이클래스153"
          },
          {
            time: "11:00 - 12:30",
            title: "기념품 쇼핑 & 이른 점심",
            place: "이순신광장 주변",
            tip: "여수 갓김치, 추가 간식(딸기모찌 등) 구매 후 이순신수제버거 등으로 가벼운 점심",
            type: "activity",
            icon: "utensils",
            mapQuery: "여수 이순신광장"
          },
          {
            time: "12:30 이후",
            title: "여수 출발 ➔ 이천 도착",
            place: "이동 및 휴게소",
            tip: "아이들 점심 식사 후 낮잠 시간에 맞춰 장거리 이동 시작. 중간중간 휴게소 들르며 안전 운전!",
            type: "travel",
            icon: "car"
          }
        ]
      }
    ];

    // 비용 산정 데이터 (실제 예약 내역 반영)
    const costData = {
      total: 1294940, // 664,240 + 80,700 + 150,000(교통) + 350,000(식비) + 50,000(기타티켓)
      categories: [
        { name: "숙박비 (예약완료)", amount: 664240, details: "하이클래스153 풀빌라 3박 예약 완료", icon: "bed", color: "text-blue-600", bg: "bg-blue-50" },
        { name: "관광/체험비", amount: 130700, details: "아쿠아플라넷(80,700원 결제) + 케이블카 등 예상", icon: "ticket", color: "text-green-600", bg: "bg-green-50" },
        { name: "식비 및 간식 (예상)", amount: 350000, details: "게장, 횟집 포장, 카페, 배달 음식 등", icon: "utensils", color: "text-orange-600", bg: "bg-orange-50" },
        { name: "교통비 (예상)", amount: 150000, details: "이천↔여수 왕복 주유비 및 톨게이트", icon: "car", color: "text-purple-600", bg: "bg-purple-50" }
      ]
    };

    const typeConfigs = {
      travel: { bg: "bg-purple-100", text: "text-purple-700", border: "border-purple-200", label: "이동" },
      activity: { bg: "bg-green-100", text: "text-green-700", border: "border-green-200", label: "관광/체험" },
      food: { bg: "bg-orange-100", text: "text-orange-700", border: "border-orange-200", label: "식사/간식" },
      accommodation: { bg: "bg-blue-100", text: "text-blue-700", border: "border-blue-200", label: "숙소/휴식" },
      cafe: { bg: "bg-amber-100", text: "text-amber-700", border: "border-amber-200", label: "카페" },
    };

    let activeDay = 1;

    function renderApp() {
      renderTabs();
      renderContent();
      renderNavButtons();
      lucide.createIcons();
    }

    function renderTabs() {
      const container = document.getElementById('tabs-container');
      let tabsHtml = tripData.map(day => `
        <button
          onclick="setActiveDay(${day.day})"
          class="flex-shrink-0 px-5 py-2 rounded-xl font-semibold transition-all duration-200 ${
            activeDay === day.day
              ? 'bg-blue-600 text-white shadow-md shadow-blue-200'
              : 'bg-white text-slate-500 hover:bg-blue-50'
          }"
        >
          <div class="text-[10px] font-medium opacity-80 uppercase leading-none mb-0.5">${day.date}</div>
          <div class="text-sm">Day ${day.day}</div>
        </button>
      `).join('');

      tabsHtml += `
        <button
          onclick="setActiveDay('cost')"
          class="flex-shrink-0 px-5 py-2 rounded-xl font-semibold transition-all duration-200 ${
            activeDay === 'cost'
              ? 'bg-emerald-600 text-white shadow-md shadow-emerald-200'
              : 'bg-white text-slate-500 hover:bg-emerald-50'
          }"
        >
          <div class="text-[10px] font-medium opacity-80 uppercase leading-none mb-0.5">예산</div>
          <div class="text-sm">비용 정리</div>
        </button>
      `;

      container.innerHTML = tabsHtml;
    }

    window.setActiveDay = function(day) {
      activeDay = day;
      renderApp();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderContent() {
      const titleContainer = document.getElementById('day-title-container');
      const contentContainer = document.getElementById('content-container');

      if (activeDay === 'cost') {
        titleContainer.innerHTML = `
          <h2 class="text-2xl font-bold text-slate-800 flex items-center">
            <span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-lg mr-3 text-lg">
              Total
            </span>
            여행 예산 요약
          </h2>
        `;
        
        contentContainer.className = "space-y-4";
        let costHtml = `
          <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 mb-6 text-center">
            <p class="text-slate-500 font-medium mb-2">총 지출 및 예상 예산</p>
            <div class="text-4xl md:text-5xl font-extrabold text-emerald-600 tracking-tight">
              ${costData.total.toLocaleString()}원
            </div>
            <p class="text-xs text-slate-400 mt-3 break-keep">* 숙박 및 아쿠아플라넷은 결제 완료 금액이며, 나머지는 예상 지출입니다.</p>
          </div>
          <div class="grid gap-3 md:gap-4">
        `;

        costHtml += costData.categories.map(cat => `
          <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
             <div class="h-14 w-14 rounded-full ${cat.bg} ${cat.color} flex items-center justify-center shrink-0">
               <i data-lucide="${cat.icon}" class="w-6 h-6"></i>
             </div>
             <div class="flex-1">
               <div class="text-base font-bold text-slate-800">${cat.name}</div>
               <div class="text-sm text-slate-500 mt-0.5">${cat.details}</div>
             </div>
             <div class="text-lg font-extrabold text-slate-800 shrink-0">
               ${cat.amount.toLocaleString()}원
             </div>
          </div>
        `).join('');

        costHtml += `</div>`;
        contentContainer.innerHTML = costHtml;
      } else {
        const dayData = tripData.find(d => d.day === activeDay);
        titleContainer.innerHTML = `
          <h2 class="text-2xl font-bold text-slate-800 flex items-center">
            <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg mr-3 text-lg">
              Day ${dayData.day}
            </span>
            ${dayData.title}
          </h2>
        `;

        contentContainer.className = "relative border-l-2 border-blue-100 ml-4 md:ml-6 space-y-8";
        contentContainer.innerHTML = dayData.events.map(event => {
          const config = typeConfigs[event.type] || typeConfigs.activity;
          const mapButtonHtml = event.mapQuery ? `
            <a href="https://map.naver.com/v5/search/${encodeURIComponent(event.mapQuery)}" target="_blank" rel="noopener noreferrer" class="ml-auto flex items-center shrink-0 text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-1.5 rounded-md hover:bg-emerald-100 transition-colors shadow-sm">
              <i data-lucide="map" class="w-3.5 h-3.5 mr-1"></i>
              지도
            </a>
          ` : '';

          return `
            <div class="relative pl-8 md:pl-10">
              <div class="absolute -left-[17px] top-1 h-8 w-8 rounded-full border-4 border-white flex items-center justify-center shadow-sm ${config.bg}">
                <i data-lucide="${event.icon}" class="w-4 h-4 ${config.text}"></i>
              </div>
              <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                <div class="flex flex-wrap items-start justify-between gap-2 mb-2">
                  <div class="flex items-center space-x-2 text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-md text-sm w-fit">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    <span>${event.time}</span>
                  </div>
                  <span class="text-xs font-semibold px-2.5 py-1 rounded-full border ${config.bg} ${config.text} ${config.border}">
                    ${config.label}
                  </span>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mt-3 mb-2">${event.title}</h3>
                <div class="flex items-center justify-between mb-4">
                  <div class="flex items-center text-slate-500 font-medium text-sm">
                    <i data-lucide="map-pin" class="w-4 h-4 mr-1.5 shrink-0"></i>
                    <span>${event.place}</span>
                  </div>
                  ${mapButtonHtml}
                </div>
                <div class="bg-amber-50 rounded-xl p-4 border border-amber-100/50 relative overflow-hidden">
                  <div class="absolute top-0 left-0 w-1 h-full bg-amber-400"></div>
                  <div class="flex gap-3">
                    <div class="mt-0.5 text-amber-500 shrink-0">
                      <i data-lucide="info" class="w-[18px] h-[18px]"></i>
                    </div>
                    <div class="text-sm">
                      <p class="font-bold text-amber-800 mb-1 leading-tight">육아 꿀팁</p>
                      <p class="text-amber-900 leading-snug break-keep">${event.tip}</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function renderNavButtons() {
      const container = document.getElementById('nav-buttons-container');
      if (activeDay === 'cost') {
        container.innerHTML = `
          <button onclick="setActiveDay(1)" class="w-full py-4 bg-white border-2 border-slate-200 rounded-2xl font-bold text-slate-600 hover:bg-slate-50">
            1일 차 일정으로 돌아가기
          </button>
        `;
        return;
      }

      const isFirst = activeDay === 1;
      const isLast = activeDay === tripData.length;

      let html = '';
      if (!isFirst) {
        html += `
          <button onclick="setActiveDay(${activeDay - 1})" class="w-full py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 text-sm">
            이전 날 일정 보기
          </button>
        `;
      }
      
      if (!isLast) {
        html += `
          <button onclick="setActiveDay(${activeDay + 1})" class="w-full py-4 bg-blue-600 rounded-2xl font-extrabold text-white shadow-lg text-lg">
            다음 날 (${activeDay + 1}일 차) 일정 보기
          </button>
        `;
      } else {
        html += `
          <button onclick="setActiveDay('cost')" class="w-full py-4 bg-emerald-600 rounded-2xl font-extrabold text-white shadow-lg text-lg">
            최종 비용 확인하기
          </button>
        `;
      }
      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', renderApp);
  </script>
</body>
</html>
